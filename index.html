<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Árbol de habilidades — Prueba</title>
  <base href="./">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="hud">
    <div id="players-list"></div>
    <div id="player-info">
      <img id="player-avatar" src="" alt="avatar">
      <div>
        <div id="player-name">—</div>
        <div>Puntos: <span id="player-points">0</span></div>
        <div>Gastados: <span id="player-spent">0</span></div>
      </div>
    </div>
    <!-- Eliminado bloque de controles CSV -->
  </header>

  <main id="stage">
    <aside id="left-panel">
      <div id="categories">
        <button class="cat-btn" data-cat="gaothfamily">Familia Gaoth</button>
        <button class="cat-btn" data-cat="gaothcircus">Circo Gaoth</button>
        <button class="cat-btn" data-cat="dragons">Dragones</button>
        <button class="cat-btn" data-cat="firstorder">Primera Orden</button>
      </div>

      <div id="characters-list"></div>
    </aside>

    <section id="canvas">
      <svg id="connections" preserveAspectRatio="none"></svg>
      <div id="skill-area">
        <!-- skill nodes se generan aquí -->
      </div>
    </section>

    <aside id="info-panel">
      <h3 id="skill-title">Selecciona una habilidad</h3>
      <div id="skill-details">
        <p><strong>ID:</strong> <span id="skill-id">—</span></p>
        <p><strong>Costo:</strong> <span id="skill-cost">—</span></p>
        <p><strong>Usos:</strong> <span id="skill-uses">—</span></p>
        <p><strong>Duración:</strong> <span id="skill-duration">—</span></p>
        <p><strong>Rango:</strong> <span id="skill-range">—</span></p>
        <p><strong>Descripción:</strong> <span id="skill-desc">—</span></p>
      </div>
      <div id="instructions">
        <p>Click: ver info · Doble click: comprar (para el jugador seleccionado)</p>
      </div>
    </aside>
  </main>

  <footer id="footer">
    <small>Estado guardado en localStorage. Los personajes se cargan automáticamente desde el CSV incrustado.</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
